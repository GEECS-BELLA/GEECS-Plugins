[tool.poetry]
name = "geecs-scanner-gui"
version = "0.5.0"
description = ""
authors = ["Christopher Doss <CEDoss@lbl.gov>"]
readme = "README.md"
packages = [{include = "geecs_scanner"}]

[tool.poetry.dependencies]
# python = ">=3.9,<3.11"
python = ">=3.10,<3.11"  # Update this line to allow Xopt's required Python version

# PyQt5 = "^5.15.9"
PyQt5 = "5.15.11"

pyqt5-qt5 = "5.15.16"
# pyqt5-tools = "^5.15.9.3.3"
geecs-pythonapi = {path = "../GEECS-PythonAPI", develop = true}
pyyaml = "^6.0.2"
Xopt = { git = "https://github.com/xopt-org/Xopt.git", tag = "v2.5.3" }


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
