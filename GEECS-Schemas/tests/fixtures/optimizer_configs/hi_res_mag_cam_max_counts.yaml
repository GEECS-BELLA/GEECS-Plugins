vocs:
  variables:
#    U_ESP_JetXYZ:Position.Axis 2: [ -8, -7 ]
#    JetZ_with_probe:composite_var: [ 3, 7]
    U_ESP_JetXYZ:Position.Axis 3: [2., 6.0]
    U_HP_Daq:AnalogOutput.Channel 1: [1.5, 2.5]
    U_ModeImagerESP:Position.Axis 2: [-17.25, -17.0]
    U_ESP_JetXYZ:Position.Axis 2: [-8., -6.5]
    U_CompAerotech:Position.Axis1: [41800, 42200]
    U_1HzShiftedBox:delay.Channel_C: [.00058, 0.00065]

  objectives:
    f: MINIMIZE

evaluator:
  module: geecs_scanner.optimization.evaluators.beam_sum_counts_evaluator
  class: MaxCountsEvaluator

  kwargs:
    # Custom evaluator parameters
    analyzers:
      # Single device example: UC_TC_Output camera
      - diagnostic: UC_HiResMagCam
        scan:
          mode: per_bin
generator:
  name: bayes_default

device_requirements:
  Devices:
    UC_HiResMagCam:
      add_all_variables: false
      save_nonscalar_data: true
      synchronous: true
      variable_list:
        - acq_timestamp
    U_BCaveICT:
      add_all_variables: false
      save_nonscalar_data: true
      synchronous: true
      variable_list:
        - acq_timestamp
        - Python Results.ChA
    U_BCaveMagSpec:
      add_all_variables: false
      save_nonscalar_data: true
      synchronous: true
      variable_list:
        - acq_timestamp
