name: unit-tests

on: [push, pull_request]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install poetry

      - name: Install root dependencies
        run: poetry install --with dev

      - name: Run root unit tests
        run: poetry run pytest -m "not integration and not gui" --tb=short -q

      - name: Install GeecsBluesky dependencies
        working-directory: GeecsBluesky
        run: poetry install --with dev

      - name: Run GeecsBluesky pure unit tests
        working-directory: GeecsBluesky
        run: poetry run pytest tests -m "not integration and not fake_server" --tb=short -q
