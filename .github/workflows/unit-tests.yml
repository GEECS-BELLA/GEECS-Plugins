name: unit-tests

on: [push, pull_request]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install poetry

      - name: Install root dependencies
        run: poetry install --with dev

      - name: Run root unit tests
        # One pytest process per testpath: the subpackages' identically-named
        # tests/ trees (tests.conftest) collide when collected in a single
        # process under pytest >= 8, whose importlib import mode resolves
        # real dotted module names first. Per-package runs are the normal
        # mode everywhere else; this mirrors them.
        run: |
          poetry run pytest tests -m "not integration and not gui" --tb=short -q
          poetry run pytest ImageAnalysis/tests -m "not integration and not gui" --tb=short -q
          poetry run pytest ScanAnalysis/tests -m "not integration and not gui" --tb=short -q
          poetry run pytest GEECS-Data-Utils/tests -m "not integration and not gui" --tb=short -q

      - name: Install GeecsBluesky dependencies
        working-directory: GeecsBluesky
        run: poetry install --with dev

      - name: Run GeecsBluesky pure unit tests
        working-directory: GeecsBluesky
        run: poetry run pytest tests -m "not integration and not fake_server" --tb=short -q
